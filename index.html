<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Registration</title>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="style/style.css">
<link rel="stylesheet" href="main.js">
    
</head>
<body>
    <div class="container main py-5">
        <div class="page-card">
            <div class="hero-section text-center">
                <h1>Appointment Registration</h1>
                <p>Please fill out the form below to join the appointment queue.</p>
            </div>

            <div class="content-section">
                <div class="section-heading">
                    <h3>Registration Form</h3>
                </div>

                <form id="registrationForm" novalidate>
                    <div class="form-group row">
                        <label for="fname" class="col-md-2 col-form-label">First Name</label>
                        <div class="col-md-10">
                            <input
                                type="text"
                                class="form-control"
                                id="fname"
                                name="firstname"
                                placeholder="Enter first name"
                                required
                            >
                        </div>
                    </div>

                    <div class="form-group row">
                        <label for="lname" class="col-md-2 col-form-label">Last Name</label>
                        <div class="col-md-10">
                            <input
                                type="text"
                                class="form-control"
                                id="lname"
                                name="lastname"
                                placeholder="Enter last name"
                                required
                            >
                        </div>
                    </div>

                    <div class="form-group row">
                        <label for="age" class="col-md-2 col-form-label">Age</label>
                        <div class="col-md-10">
                            <input
                                type="number"
                                class="form-control"
                                id="age"
                                name="age"
                                placeholder="Enter age"
                                min="1"
                                max="150"
                                required
                            >
                            <small class="form-text text-muted">Age must be between 1 and 150.</small>
                        </div>
                    </div>

                    <div class="form-group row">
                        <label class="col-md-2 col-form-label">Gender</label>
                        <div class="col-md-10">
                            <div class="gender-group">
                                <div class="form-check form-check-inline">
                                    <input
                                        type="radio"
                                        class="form-check-input"
                                        id="male"
                                        name="gender"
                                        value="Male"
                                        required
                                    >
                                    <label class="form-check-label" for="male">Male</label>
                                </div>

                                <div class="form-check form-check-inline">
                                    <input
                                        type="radio"
                                        class="form-check-input"
                                        id="female"
                                        name="gender"
                                        value="Female"
                                        required
                                    >
                                    <label class="form-check-label" for="female">Female</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="text-right">
                        <button type="submit" class="btn btn-primary btn-custom">
                            Add to Queue
                        </button>
                    </div>
                </form>
            </div>

            <div class="content-section pt-0">
                <div class="section-heading">
                    <h3>Appointment Queue</h3>
                </div>

                <div class="table-box">
                    <div class="table-responsive">
                        <table class="table table-bordered table-hover mb-0">
                            <thead>
                                <tr>
                                    <th>Serial No.</th>
                                    <th>Queue No.</th>
                                    <th>First Name</th>
                                    <th>Last Name</th>
                                    <th>Age</th>
                                    <th>Gender</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody">
                                <tr id="emptyRow">
                                    <td colspan="8" class="empty-state">No registrations yet.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="footer-text">
                    Created By: Ashmeet Singh Jandu
                </div>
            </div>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="script/app.js"></script>
    
</body>
</html>
